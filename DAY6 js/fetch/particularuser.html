<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color: antiquewhite;
            font-family: 'Times New Roman', Times, serif;
        }
        #main{
            margin: 20px;
            background: darkkhaki;
            padding: 20px;
            display: flex;
            justify-content: center;
            text-align: center;
        }
        form{
            padding: 20px;
        }
        input{
            padding: 20px;
        }
        button{
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="main">
        <form id="mainContainer">
            <input type="number" id="userInput" value="1" min="1" max="10"/>
            <button onclick="handleClick(event)">Search</button>
        </form>
        </div>
    <div id="output"></div>
    <script>
        const fetchData=async(userInput)=>{
            const output=document.getElementById("output")
            const data= await fetch(`https://jsonplaceholder.typicode.com/users/${userInput}`);
            const response=await data.json();
            console.log(response)
            output.innerHTML=`
            ${response.name}
            `
        }
         const handleClick=(e)=>{
            e.preventDefault()
            const userInput = document.getElementById("userInput").value;
            fetchData(userInput)
         }

    </script>
</body>
</html>
