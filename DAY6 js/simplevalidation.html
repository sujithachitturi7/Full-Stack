<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="joinform">
        <label> Name (must fill!):</label>
        <input type="text" id="nameInput" required minlength="3"><br><br>
        <label>Email (must look like an email!):</label>
        <input type="email" id="emailInput" required><br><br>
        <label>Age (must be number!): </label>
        <input type="number" id="ageInput" min="13" max="120" required><br><br>
        <button type="submit"> Join!</button>
    </form>
    <div id="output"></div>
    <script> 
        document.getElementById("joinform").addEventListener("submit",function(e){
            e.preventDefault();
            const name= document.getElementById("nameInput").value;
            const email=document.getElementById("emailInput").value;
            const age=document.getElementById("ageInput").value;

            document.getElementById("output").innerHTML =`
            name:${name}<br><br>
            email:${email}<br><br>
            age:${age}
            `;
        })
    </script>
</body> 
</html>
